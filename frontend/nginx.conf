server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Безопасность (Lighthouse: CSP / HSTS / COOP / кликджекинг) ──
    # НЮАНС nginx: add_header из server{} НЕ наследуется в location,
    # где есть свой add_header — поэтому в блоке статики ниже
    # ключевые заголовки продублированы.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP: script-src строгий ('self', без inline — полифилл вынесен в бандл).
    # 'wasm-unsafe-eval' — на случай wasm-декодеров three (draco/meshopt).
    # style-src 'unsafe-inline' обязателен: у нас море инлайн-стилей в React.
    # frame-src/worker-src blob: — под PDFViewer (iframe c blob-PDF) и воркеры three.
    # connect-src пока широкий (https:/wss:) — GLB/PLY и фото приходят с разных
    # хостов (webhook отдаёт абсолютные URL). Когда список доменов устаканится,
    # сузить до 'self' https://*.gottland.ru wss://*.gottland.ru + хост моделей.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss: blob: data:; worker-src 'self' blob:; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # API → backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection "";

        # Для загрузки файлов и долгих запросов (polling)
        client_max_body_size 100m;
        proxy_read_timeout   3700s;  # чуть больше 1 часа
        proxy_send_timeout   3700s;
    }

    # SPA fallback
    # robots.txt и llms.txt отдаются отсюда как реальные файлы (try_files $uri
    # находит их в dist) — раньше их не было и фоллбэк возвращал index.html,
    # отсюда «17 ошибок синтаксиса» в Lighthouse.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статика с кэшем (имена файлов хешированные — можно immutable)
    location ~* \.(js|css|png|jpg|svg|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        # повтор из server{} — см. нюанс про наследование add_header выше
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
